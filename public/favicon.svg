<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Ultra-modern Gradient -->
    <linearGradient id="ultra-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Sleek Rounded Diamond Base -->
  <rect width="22" height="22" x="5" y="5" rx="6" fill="url(#ultra-grad)" transform="rotate(45, 16, 16)" filter="url(#shadow)" />
  
  <!-- Inset glow for glass effect -->
  <rect width="18" height="18" x="7" y="7" rx="5" fill="white" opacity="0.1" transform="rotate(45, 16, 16)" />

  <!-- Minimalist Thin Rotation Path -->
  <path 
    d="M16 10a6 6 0 1 0 6 6 6 6 0 0 0-6-6z" 
    fill="none" 
    stroke="white" 
    stroke-width="1.8" 
    stroke-linecap="round" 
    stroke-dasharray="28 8"
    opacity="0.9"
  />
  
  <!-- Sharp Arrowhead head -->
  <path d="M16 8l3 2-3 2z" fill="white" />
</svg>